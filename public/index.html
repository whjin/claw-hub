<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw-Hub AI智能体</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f5f7fa;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        background: #2c3e50;
        color: white;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .header h1 {
        font-size: 20px;
        font-weight: 600;
      }
      .model-selector {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .model-selector select {
        padding: 6px 12px;
        border-radius: 4px;
        border: none;
        outline: none;
        font-size: 14px;
      }
      .chat-container {
        flex: 1;
        padding: 24px;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
      }
      .message-item {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .message-header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 500;
      }
      .message-role.user {
        color: #3498db;
      }
      .message-role.assistant {
        color: #27ae60;
      }
      .message-model {
        font-size: 12px;
        color: #7f8c8d;
        background: #ecf0f1;
        padding: 2px 6px;
        border-radius: 4px;
      }
      .message-content {
        padding: 12px 16px;
        border-radius: 8px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .message-item.user .message-content {
        background: #3498db;
        color: white;
        margin-left: auto;
        max-width: 80%;
      }
      .message-item.assistant .message-content {
        background: white;
        color: #2c3e50;
        border: 1px solid #e0e0e0;
        max-width: 90%;
      }
      .tool-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .tool-tag {
        font-size: 12px;
        background: #f39c12;
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
      }
      .input-container {
        background: white;
        padding: 16px 24px;
        border-top: 1px solid #e0e0e0;
      }
      .input-wrapper {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }
      .input-wrapper textarea {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        outline: none;
        font-size: 14px;
        line-height: 1.5;
        resize: none;
        max-height: 200px;
        font-family: inherit;
      }
      .input-wrapper textarea:focus {
        border-color: #3498db;
      }
      .input-wrapper button {
        padding: 12px 24px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .input-wrapper button:disabled {
        background: #bdc3c7;
        cursor: not-allowed;
      }
      .input-wrapper button:hover:not(:disabled) {
        background: #2980b9;
      }
      .empty-tip {
        text-align: center;
        color: #7f8c8d;
        margin-top: 100px;
      }
      .loading {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #ecf0f1;
        border-top: 2px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="header">
        <h1>Claw-Hub AI智能体</h1>
        <div class="model-selector">
          <span>模型选择：</span>
          <select v-model="selectedModel" :disabled="loading">
            <option v-for="model in supportedModels" :key="model" :value="model">{{ model.toUpperCase() }}</option>
          </select>
        </div>
      </div>

      <div class="chat-container" ref="chatContainer">
        <div v-if="messageList.length === 0" class="empty-tip">
          <h3>欢迎使用 Claw-Hub AI智能体</h3>
          <p>输入你的需求，我会自主调用工具帮你完成任务</p>
        </div>

        <div v-for="(msg, index) in messageList" :key="index" class="message-item" :class="msg.role">
          <div class="message-header">
            <span class="message-role" :class="msg.role"> {{ msg.role === 'user' ? '你' : 'OpenClaw智能体' }} </span>
            <span v-if="msg.usedModel" class="message-model">{{ msg.usedModel.toUpperCase() }}</span>
          </div>

          <div v-if="msg.toolCalls && msg.toolCalls.length > 0" class="tool-tags">
            <span v-for="(tool, i) in msg.toolCalls" :key="i" class="tool-tag"> 调用工具：{{ tool }} </span>
          </div>

          <div class="message-content">{{ msg.content }}</div>
        </div>

        <div v-if="loading" class="message-item assistant">
          <div class="message-header">
            <span class="message-role assistant">OpenClaw智能体</span>
            <span class="loading"></span>
          </div>
          <div class="message-content">思考中...</div>
        </div>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <textarea
            v-model="userInput"
            placeholder="输入你的需求，按Enter发送，Shift+Enter换行"
            :disabled="loading"
            @keydown.enter.prevent="handleSend"
            @keydown.shift.enter="handleNewLine"
            @input="autoResize"
            ref="textareaRef"
            rows="1"
          ></textarea>
          <button @click="handleSend" :disabled="loading || !userInput.trim()">发送</button>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref, onMounted, nextTick } = Vue;

      createApp({
        setup() {
          const messageList = ref([]);
          const userInput = ref('');
          const loading = ref(false);
          const supportedModels = ref([]);
          const selectedModel = ref('');
          const chatContainer = ref(null);
          const textareaRef = ref(null);
          let ws = null;

          // 滚动到底部
          const scrollToBottom = () => {
            nextTick(() => {
              if (chatContainer.value) {
                chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
              }
            });
          };

          // 文本域自动调整高度
          const autoResize = () => {
            nextTick(() => {
              const textarea = textareaRef.value;
              if (textarea) {
                textarea.style.height = 'auto';
                textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
              }
            });
          };

          // 换行处理
          const handleNewLine = () => {
            userInput.value += '\n';
            autoResize();
          };

          // 初始化WebSocket
          const initWebSocket = () => {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
              console.log('WebSocket连接成功');
            };

            ws.onmessage = (event) => {
              const message = JSON.parse(event.data);

              if (message.type === 'assistant_response') {
                messageList.value.push({
                  role: 'assistant',
                  content: message.content,
                  toolCalls: message.toolCalls,
                  usedModel: message.usedModel,
                });
                loading.value = false;
                scrollToBottom();
              }

              if (message.type === 'error') {
                messageList.value.push({
                  role: 'assistant',
                  content: message.content,
                });
                loading.value = false;
                scrollToBottom();
              }
            };

            ws.onclose = () => {
              console.log('WebSocket连接关闭，正在重连...');
              setTimeout(initWebSocket, 3000);
            };

            ws.onerror = (error) => {
              console.error('WebSocket连接异常：', error);
            };
          };

          // 获取支持的模型列表
          const getSupportedModels = async () => {
            try {
              const res = await fetch('/api/models');
              const data = await res.json();
              if (data.code === 0) {
                supportedModels.value = data.data.supportedModels;
                selectedModel.value = data.data.defaultModel;
              }
            } catch (e) {
              console.error('获取模型列表失败：', e);
            }
          };

          // 发送消息
          const handleSend = () => {
            const content = userInput.value.trim();
            if (!content || loading.value || !ws || ws.readyState !== WebSocket.OPEN) {
              return;
            }

            // 添加用户消息到列表
            messageList.value.push({
              role: 'user',
              content: content,
            });
            scrollToBottom();

            // 发送消息到服务端
            ws.send(
              JSON.stringify({
                type: 'user_input',
                content: content,
                model: selectedModel.value,
              }),
            );

            // 清空输入框
            userInput.value = '';
            textareaRef.value.style.height = 'auto';
            loading.value = true;
          };

          onMounted(() => {
            getSupportedModels();
            initWebSocket();
          });

          return {
            messageList,
            userInput,
            loading,
            supportedModels,
            selectedModel,
            chatContainer,
            textareaRef,
            handleSend,
            handleNewLine,
            autoResize,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
